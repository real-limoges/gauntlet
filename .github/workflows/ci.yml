name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (GHC 9.12.2)
    runs-on: ubuntu-latest
    container: haskell:9.12.2

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            libcairo2-dev \
            libpango1.0-dev \
            libglib2.0-dev \
            pkg-config \
            libncurses-dev \
            zlib1g-dev

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
          key: ${{ runner.os }}-ghc-9.12.2-store-${{ hashFiles('cabal.project.freeze', 'gauntlet.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.12.2-store-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: dist-newstyle
          key: ${{ runner.os }}-ghc-9.12.2-dist-${{ hashFiles('cabal.project.freeze', 'gauntlet.cabal', 'src/**/*.hs', 'test/**/*.hs') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.12.2-dist-${{ hashFiles('cabal.project.freeze', 'gauntlet.cabal') }}
            ${{ runner.os }}-ghc-9.12.2-dist-

      - name: Update cabal index
        run: cabal update

      - name: Build
        run: cabal build all --enable-optimization=2

      - name: Test
        run: cabal test --test-show-details=direct