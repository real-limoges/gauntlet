name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (GHC 9.12.2)
    runs-on: ubuntu-latest
    container: haskell:9.12.2

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y \
            libncurses-dev \
            zlib1g-dev

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-9.12.2-cabal-${{ hashFiles('gauntlet.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.12.2-cabal-

      - name: Update cabal index
        run: cabal update

      - name: Build
        run: cabal build all --enable-optimization=2

      - name: Test
        run: cabal test --test-show-details=direct