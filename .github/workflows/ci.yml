name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (GHC ${{ matrix.ghc }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ghc: ["9.10.1"]
        cabal: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libpango1.0-dev \
            libglib2.0-dev \
            pkg-config \
            libncurses-dev \
            zlib1g-dev

      - name: Set up GHC ${{ matrix.ghc }}
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: ${{ matrix.cabal }}

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-${{ matrix.ghc }}-cabal-${{ hashFiles('cabal.project.freeze') }}
          restore-keys: |
            ${{ runner.os }}-ghc-${{ matrix.ghc }}-cabal-

      - name: Update cabal index
        run: cabal update

      - name: Build
        run: cabal build all --enable-optimization=2

      - name: Test
        run: cabal test --test-show-details=direct