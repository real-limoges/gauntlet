cradle:
  multi:
    - path: "./src"
      config:
        cradle:
          cabal:
            component: "lib:gauntlet"

    - path: "./app/Main.hs"
      config:
        cradle:
          cabal:
            component: "exe:gauntlet-exe"

    - path: "./test"
      config:
        cradle:
          cabal:
            component: "test:gauntlet-test"
