cradle:
  multi:
    - path: "./src"
      config:
        cradle:
          cabal:
            component: "lib:laughing-waffle"

    - path: "./app/Main.hs"
      config:
        cradle:
          cabal:
            component: "exe:laughing-waffle-exe"

    - path: "./test"
      config:
        cradle:
          cabal:
            component: "test:laughing-waffle-test"
